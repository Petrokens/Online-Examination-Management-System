<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div th:if="${status == 'terminated'}"
     class="alert alert-danger shadow-sm"
     role="alert">
    <h4 class="alert-heading">⚠️ Exam Terminated!</h4>
    <p>
        Your session was automatically terminated due to security policy violations.
        A score of 0% has been recorded for this attempt.
    </p>
</div>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Welcome, <span th:text="${user?.name}">Student</span>!</h2>
        <a href="/user/logout" class="btn btn-outline-danger btn-sm">Logout</a>
    </div>

    <div class="mb-5">
        <h4 class="mb-3">Available Exams</h4>
        <div class="row row-cols-1 row-cols-md-3 g-3">
            <div class="col" th:each="exam : ${exams}">
                <div class="card h-100 shadow-sm border-0">
                    <div class="card-body d-flex flex-column justify-content-between">
                        <div>
                            <h5 class="card-title fw-bold text-dark mb-2" th:text="${exam.examName}">Exam Name</h5>
                            <div class="text-muted small mb-3">
                                <p class="mb-1" th:text="'⏱️ Duration: ' + ${exam.durationMinutes} + ' mins'"></p>
                                <p class="mb-1" th:text="'📊 Total Marks: ' + ${exam.totalMarks} + ' pts'"></p>
                                <p class="mb-1 text-secondary" th:text="'Limit: ' + ${exam.maxAttempts} + ' attempts'"></p>
                            </div>
                            <div class="progress mt-2 mb-3" style="height: 10px;">
                                <div class="progress-bar bg-info" role="progressbar"
                                     th:style="'width: ' + (${(attemptCounts[exam.examId] ?: 0) * 100 / (exam.maxAttempts == 0 ? 1 : exam.maxAttempts)}) + '%'"></div>
                            </div>
                        </div>
                        <button th:if="(${attemptCounts[exam.examId]} ?: 0) < (${exam.maxAttempts} ?: 0)"
                                th:onclick="'startExamSecurely(' + ${exam.examId} + ')'"
                                class="btn btn-success w-100">Start Exam</button>
                        <span th:if="(${attemptCounts[exam.examId]} ?: 0) >= (${exam.maxAttempts} ?: 0)"
                              class="badge bg-danger p-2 d-block w-100">Limit Reached</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mb-5">
        <h4 class="mb-3">Recent Results</h4>

        <div th:if="${results == null || results.isEmpty()}" class="text-muted p-3">No recent results found.</div>

        <div class="row row-cols-1 row-cols-md-3 g-3">
            <div th:each="r, rStat : ${results}" th:if="${rStat.index < 3}" class="col">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span th:text="${r.exam != null ? r.exam.examName : 'N/A'}" class="fw-bold"></span>
                            <span th:classappend="${r.status == 'PASS' ? 'text-success' : 'text-danger'}" class="fw-bold" th:text="${r.percentage} + '%'"></span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar" role="progressbar" th:classappend="${r.status == 'PASS' ? 'bg-success' : 'bg-danger'}" th:style="|width:${r.percentage}%|"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-3" th:if="${results != null && !results.isEmpty()}">
            <a th:href="@{/student/results/all}" class="btn btn-outline-primary btn-sm fw-bold">View All Results →</a>
        </div>
    </div>
</div>

<script>
    async function startExamSecurely(examId) {
        const element = document.documentElement;
        window.isTransitioning = true;
        if (element.requestFullscreen) {
            try {
                await element.requestFullscreen();
                window.location.href = '/exam/start/' + examId;
            } catch (err) {
                console.error("Fullscreen failed:", err);
                alert("Security Requirement: Please allow full-screen mode to begin your exam.");
            }
        } else {
            window.location.href = '/exam/start/' + examId;
        }
    }
</script>
</body>
</html>
