<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Welcome, <span th:text="${user?.name}">Student</span>!</h2>
        <a href="/logout" class="btn btn-outline-danger">Logout</a>
    </div>

    <div class="row">
        <div class="col-md-7">
            <h4 class="mb-3">Available Exams</h4>
            <div class="card mb-3" th:each="exam : ${exams}">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="card-title mb-1" th:text="${exam.examName}">Exam Name</h5>
                        <p class="text-muted small mb-0"
                           th:text="'Limit: ' + ${exam.maxAttempts} + ' attempts'"></p>

                        <div class="progress mt-2" style="width: 200px; height: 10px;">
                            <div class="progress-bar"
                                 role="progressbar"
                                 th:style="'width: ' + (${(attemptCounts[exam.examId] ?: 0) * 100 / (exam.maxAttempts == 0 ? 1 : exam.maxAttempts)}) + '%'"
                                 aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                            </div>
                        </div>
                    </div>

                    <a th:if="(${attemptCounts[exam.examId]} ?: 0) < (${exam.maxAttempts} ?: 0)"
                       th:href="@{'/exam/start/' + ${exam.examId}}"
                       class="btn btn-success">Start Exam</a>

                    <span th:if="(${attemptCounts[exam.examId]} ?: 0) >= (${exam.maxAttempts} ?: 0)"
                          class="badge bg-danger p-2">Limit Reached</span>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <h4 class="mb-3">Recent Results</h4>

            <div th:if="${results == null || results.isEmpty()}" class="text-muted p-3">
                No recent results found.
            </div>

            <div th:each="r : ${results}" th:if="${rStat.index < 3}" class="card mb-3 shadow-sm border-0">
                <div class="card-body p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span th:text="${r.exam != null ? r.exam.examName : 'N/A'}" class="fw-bold"></span>
                        <span th:classappend="${r.status == 'PASS' ? 'text-success' : 'text-danger'}"
                              class="fw-bold"
                              th:text="${r.percentage} + '%'"></span>
                    </div>

                    <div class="progress" style="height: 8px;">
                        <div class="progress-bar"
                             role="progressbar"
                             th:classappend="${r.status == 'PASS' ? 'bg-success' : 'bg-danger'}"
                             th:style="'width: ' + ${r.percentage} + '%'"
                             aria-valuenow="${r.percentage}" aria-valuemin="0" aria-valuemax="100">
                        </div>
                    </div>
                </div>
            </div>

            <a href="/student/results/all" th:if="${results != null && results.size() > 0}" class="btn btn-link">View All History</a>
        </div>
    </div>
</div>
</body>
</html>
