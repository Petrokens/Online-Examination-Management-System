<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Questions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/exam/dashboard}">📝 ExamPortal</a>
        <a th:href="@{/exam/dashboard}" class="btn btn-outline-light btn-sm">Done Adding Questions</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="alert alert-success shadow-sm mb-4">
                <h5 class="alert-heading mb-1">Adding questions to:</h5>
                <strong th:text="${exam.examName}">Exam Name</strong>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <h3 class="fw-bold mb-4">
                        Question #<span th:text="${questionNumber}">1</span>
                    </h3>

                    <form th:action="@{/question/add/{id}(id=${exam.examId})}" th:object="${question}" method="post">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Question Prompt</label>
                            <textarea th:field="*{questionText}" class="form-control" rows="3" required placeholder="Type the question here..."></textarea>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary small fw-bold">Option A</label>
                                <input type="text" th:field="*{optionA}" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary small fw-bold">Option B</label>
                                <input type="text" th:field="*{optionB}" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary small fw-bold">Option C</label>
                                <input type="text" th:field="*{optionC}" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-secondary small fw-bold">Option D</label>
                                <input type="text" th:field="*{optionD}" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-5">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold text-success">Correct Answer</label>
                                <select th:field="*{correctAnswer}" class="form-select border-success" required>
                                    <option value="" disabled selected>Select the right option...</option>
                                    <option value="A">Option A</option>
                                    <option value="B">Option B</option>
                                    <option value="C">Option C</option>
                                    <option value="D">Option D</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Marks for this Question</label>
                                <input type="number" th:field="*{marks}" class="form-control" required min="1" value="1">
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">
                                Save Question & Add Another
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
