<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exam - Instructor Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/exam/dashboard}">📝 ExamPortal</a>
        <div class="ms-auto">
            <a href="/teacher/dashboard" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </div>
</nav>

<div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">

                    <div class="mb-4">
                        <h2 class="fw-bold text-dark">Create New Examination</h2>
                        <p class="text-muted">Fill out the structural details below to publish a new test paper to the student pool.</p>
                    </div>

                    <form th:action="${exam.examId == null} ? @{/teacher/save-exam} : @{/teacher/edit-exam/{id}(id=${exam.examId})}"
                          th:object="${exam}"
                          method="post">

                        <input type="hidden" th:field="*{examId}">

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Examination Name</label>
                            <input type="text" th:field="*{examName}" class="form-control form-control-lg" required
                                   placeholder="e.g., Introduction to Java - Midterm">
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-4">
                                <label class="form-label fw-semibold text-secondary">Duration (Minutes)</label>
                                <input type="number" th:field="*{durationMinutes}" class="form-control" required min="1" placeholder="e.g., 60">
                            </div>

                            <div class="col-md-4 mb-4">
                                <label class="form-label fw-semibold text-secondary">Total Marks</label>
                                <input type="number" th:field="*{totalMarks}" class="form-control" required min="1" placeholder="e.g., 100">
                            </div>

                            <div class="col-md-4 mb-4">
                                <label class="form-label fw-semibold text-secondary">Passing Percentage</label>
                                <input type="number" th:field="*{passingPercentage}" class="form-control" required min="1" max="100" placeholder="e.g., 40">
                            </div>
                        </div>

                        <div class="col-md-4 mb-4">
                            <label class="form-label fw-semibold text-secondary">Max Attempts</label>
                            <input type="number" th:field="*{maxAttempts}" class="form-control" required min=\"1\" placeholder=\"e.g., 3\">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-secondary">Assign Exam to Students</label>
                            <div class="card p-3 border-light shadow-sm" style="max-height: 200px; overflow-y: auto;">
                                <div th:each="student : ${allStudents}" class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{allowedStudents}"
                                           th:value="${student.userId}"
                                           th:id="${'student_' + student.userId}"
                                           th:checked="${exam.allowedStudents.contains(student)}">
                                    <label class="form-check-label" th:for="${'student_' + student.userId}" th:text="${student.name}">
                                        Student Name
                                    </label>
                                </div>
                            </div>
                            <div class="form-text text-muted">Select students who are allowed to participate in this examination.</div>
                        </div>
                        <div class="d-flex gap-3 mt-4">
                            <a href="/teacher/dashboard" class="btn btn-light btn-lg w-50 fw-semibold border">Cancel</a>
                            <button type="submit" class="btn btn-primary btn-lg w-50 fw-semibold">
                                Publish Examination
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
