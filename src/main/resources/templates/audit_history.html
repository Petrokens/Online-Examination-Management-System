<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Audit History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Approval & Rejection History</h2>
        <a href="/admin/dashboard" class="btn btn-secondary">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm">
        <table class="table table-striped mb-0">
            <thead class="table-dark">
            <tr>
                <th>Action Details</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${logPage.content}">
                <td th:text="${log.action}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center">

            <li class="page-item"
                th:classappend="${logPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/history(page=${logPage.number - 1})}">
                    Previous
                </a>
            </li>

            <li class="page-item disabled">
                <span class="page-link">
                    Page <span th:text="${logPage.number + 1}">1</span>
                    of
                    <span th:text="${logPage.totalPages}">1</span>
                </span>
            </li>

            <li class="page-item"
                th:classappend="${logPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/history(page=${logPage.number + 1})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

</div>

</body>
</html>
