<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2>All Your Results</h2>
    <a href="/student/dashboard" class="btn btn-secondary mb-3">Back to Dashboard</a>

    <table class="table table-bordered bg-white">
        <thead>
        <tr>
            <th>Exam Name</th>
            <th>Score</th>
            <th>Percentage</th>
            <th>Status</th>
            <th>Submission Time</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${results}">
            <td th:text="${r.exam != null} ? ${r.exam.examName} : 'N/A'"></td>
            <td th:text="${r.score}"></td>
            <td th:text="${r.percentage} + '%'"></td>
            <td>
                    <span th:classappend="${r.status == 'PASS'} ? 'text-success' : 'text-danger'"
                          th:text="${r.status}"></span>
            </td>
            <td th:text="${#temporals.format(r.submissionTime, 'yyyy-MM-dd HH:mm')}"></td>
        </tr>
        </tbody>
    </table>
    <nav aria-label="Page navigation">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/student/results/all(page=${currentPage - 1})}">Previous</a>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${currentPage == i} ? 'active'">
                <a class="page-link" th:href="@{/student/results/all(page=${i})}" th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/student/results/all(page=${currentPage + 1})}">Next</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
