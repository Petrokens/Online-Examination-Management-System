<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Exam Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Create Account</h2>

                    <div th:if="${error}" class="alert alert-danger text-center">
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/user/register}" th:object="${user}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required placeholder="John Doe">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   required
                                   placeholder="john@example.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Account Type</label>
                            <select th:field="*{role}" class="form-select" required>
                                <option value="">Select Role</option>
                                <option value="STUDENT">Student</option>
                                <option value="FACULTY">Teacher / Faculty</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password"
                                   th:field="*{password}"
                                   class="form-control"
                                   required
                                   placeholder="Create a strong password">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-4">Create Account</button>

                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0">Already have an account? <a th:href="@{/user/login}" class="text-decoration-none">Log in here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
