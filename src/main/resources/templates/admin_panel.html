<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">Admin Control Center</h2>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-primary text-white p-3 shadow-sm">
                <h5>Total Faculty</h5>
                <h2 th:text="${activeTeachersCount}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-info text-white p-3 shadow-sm">
                <h5>Total Students</h5>
                <h2 th:text="${totalStudentsCount}">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning text-dark p-3 shadow-sm">
                <h5>Pending Approvals</h5>
                <h2 th:text="${pendingCount}">0</h2>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-warning fw-bold">Pending Faculty Approvals</div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <tr th:each="u : ${pendingUsers}">
                            <td th:text="${u.name}" class="align-middle px-3">Name</td>
                            <td class="text-end px-3">
                                <a th:href="@{/admin/approve/{id}(id=${u.userId})}" class="btn btn-sm btn-success">Approve</a>
                                <button type="button" class="btn btn-sm btn-danger" data-bs-toggle="modal" data-bs-target="#rejectModal" th:data-href="@{/admin/reject/{id}(id=${u.userId})}">Reject</button>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white fw-bold">Active System Users</div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead>
                        <tr><th class="px-3">Name</th><th class="px-3">Role</th></tr>
                        </thead>
                        <tr th:each="u : ${activeUsers}">
                            <td th:text="${u.name}" class="px-3">Name</td>
                            <td class="px-3"><span class="badge bg-secondary" th:text="${u.role}">ROLE</span></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="rejectModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Confirm Rejection</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">Are you sure you want to reject this registration? This action is permanent.</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <a id="confirmRejectBtn" href="#" class="btn btn-danger">Confirm Reject</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const rejectModal = document.getElementById('rejectModal');
    rejectModal.addEventListener('show.bs.modal', function (event) {
        const url = event.relatedTarget.getAttribute('data-href');
        document.getElementById('confirmRejectBtn').setAttribute('href', url);
    });
</script>
</body>
</html>
